---
- name: Install and Configure MongoDB
  hosts: mongodb
  become: true

  tasks:

    - name: Add MongoDB repository
      copy:
        dest: /etc/yum.repos.d/mongodb-org.repo
        content: |
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://pgp.mongodb.com/server-7.0.asc

    - name: Clean dnf cache
      command: dnf clean all

    - name: Install MongoDB
      dnf:
        name: mongodb-org
        state: present
        update_cache: yes

    - name: Enable MongoDB service
      systemd:
        name: mongod
        enabled: yes

    - name: Start MongoDB service
      systemd:
        name: mongod
        state: started

    - name: Backup original config
      copy:
        src: /etc/mongod.conf
        dest: /etc/mongod.conf.bak
        remote_src: yes
      ignore_errors: yes

    - name: Configure MongoDB bind address safely
      lineinfile:
        path: /etc/mongod.conf
        regexp: '^ *bindIp:'
        line: '  bindIp: 0.0.0.0'
        state: present

    - name: Restart MongoDB
      systemd:
        name: mongod
        state: restarted
